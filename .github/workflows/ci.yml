name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # SimulationEndpointsTests exercises SimulateUseCase, which resolves a real Postgres
    # connection via PostgresSimulationIdempotencyStore.EnsureSchemaAsync - without a reachable
    # database these tests 500 rather than exercising the endpoint logic they're meant to test.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: conversational_ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          # setup-dotnet's cache:true hard-fails ("unable to cache dependencies") when its
          # cache-dependency-path glob (packages.lock.json by default) matches nothing, rather
          # than skipping caching - this repo has no lock files, so caching is left off until
          # one gets added.

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release
